<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>SWT-Lite Bahn - Model Railway</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
          rel="stylesheet">

    <style>
        /* -------- paper -------- */
        html, body {
            margin: 0;
            padding: 0;
        }

        .open-sans-<uniquifier> {
          font-family: "Open Sans", sans-serif;
          font-optical-sizing: auto;
          font-weight: <weight>;
          font-style: normal;
          font-variation-settings:
            "wdth" 100;
        }

        body {
            font-family: 'Open Sans', cursive;
            color: #1a1a1a;
            /*background: radial-gradient(circle at 18% 20%, #f3eee2 0, transparent 40%),*/
            /*radial-gradient(circle at 82% 70%, #efe7d6 0, transparent 45%),*/
            /*repeating-linear-gradient(0deg, transparent 0 31px, #d8cdb455 31px 32px),*/
            /*#fbf6ea;*/
            min-height: 100vh;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11pt;
        }

        /* -------- layout -------- */
        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 36px 64px;
        }

        .paper-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .hand-title {
            font-size: 54px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
            transform: rotate(-0.6deg);
        }

        .hand-sub {
            font-size: 16px;
            color: #555;
            margin: 0 0 4px 4px;
        }

        .legend-slot {
            max-width: 460px;
            flex: 0 1 auto;
        }

        .legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #fffaf0;
            padding: 10px 14px;
            border: 1.5px solid #1a1a1a;
            border-radius: 8px;
            font-size: 12px;
        }

        .legend .legend-title {
            font-weight: 700;
            margin-bottom: 2px;
        }

        .legend .legend-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .legend-content span.label {
            color: #666;
            font-weight: 500;
        }

        .legend-content span.legend-occ,
        .legend-content span.legend-mode,
        .legend-content span.legend-sig {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }

        .legend-content span.legend-occ span,
        .legend-content span.legend-mode span {
            display: inline-block;
            border-radius: 3px;
        }

        .legend-content span.legend-occ span:first-child {
            width: 14px;
            height: 14px;
            border: 1.5px solid #1a1a1a;
        }

        .legend-content span.legend-mode span:first-child {
            width: 22px;
            height: 14px;
        }

        /* -------- sketchy card -------- */
        .sketch-card {
            background: #fffaf0;
            border: 2px solid #1a1a1a;
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 18px;
            position: relative;
            box-shadow: 3px 3px 0 #1a1a1a22;
        }

        /*.sketch-card::after {*/
        /*    !* hand-drawn double line on bottom edge *!*/
        /*    content: "";*/
        /*    position: absolute;*/
        /*    left: 10px;*/
        /*    right: 10px;*/
        /*    bottom: -5px;*/
        /*    height: 2px;*/
        /*    border-bottom: 1.5px dashed #1a1a1a55;*/
        /*    pointer-events: none;*/
        /*}*/

        /* -------- controls -------- */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 2fr);
            gap: 20px 20px;
            align-items: end;
        }

        .controls-warn-row,
        .controls-info-row {
            grid-column: 1 / 3;
        }

        .hand-info {
            font-size: 13px;
            line-height: 1.4;
            color: #235e3b;
            background: #e6f1e2;
            border: 1.5px dashed #3ea66a;
            border-radius: 6px;
            padding: 8px 10px;
        }

        .hand-info .mono {
            font-size: 12px;
            color: #1a1a1a;
        }

        .ctrl {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ctrl-actions {
            grid-column: 3 / 3;
            flex-direction: row-reverse;
            align-items: center;
            gap: 10px;
        }

        .hand-label {
            font-size: 22px;
            color: #1a1a1a;
            transform: rotate(-0.4deg);
            margin-left: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border: 1.5px solid #1a1a1a;
            border-radius: 50%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: #fff;
            transform: rotate(0.6deg);
        }

        .hand-hint {
            flex: 1 auto;
            text-align: right;
            font-size: 12px;
            color: #888;
            font-weight: 400;
            letter-spacing: 0;
        }

        .hand-warn {
            font-size: 12px;
            line-height: 1.4;
            color: #7a2820;
            background: #fbe4dc;
            border: 1.5px dashed #d24a3d;
            border-radius: 6px;
            padding: 8px 10px;
            margin-top: 4px;
        }

        .hand-warn .mono {
            font-size: 11px;
        }

        .hand-select {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 8px 10px;
            border: 1.5px solid #1a1a1a;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            outline: none;
            transition: box-shadow 120ms;
        }

        .hand-select:hover {
            box-shadow: 2px 2px 0 #1a1a1a;
        }

        .hand-select:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            background: #f3eee2;
        }

        .sim-btn {
            font-size: 24px;
            padding: 10px 22px;
            background: #1a1a1a;
            color: #fbf6ea;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #d24a3d;
            transition: transform 80ms, box-shadow 80ms;
        }

        .sim-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0 #d24a3d;
        }

        .sim-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #d24a3d;
        }

        .sim-btn:disabled {
            background: #ccc;
            color: #777;
            border-color: #777;
            cursor: not-allowed;
            box-shadow: none;
        }

        .reset-btn {
            font-size: 14px;
            padding: 8px 12px;
            background: transparent;
            border: 1.5px dashed #1a1a1a;
            border-radius: 6px;
            cursor: pointer;
        }

        .reset-btn:hover {
            background: #f3eee2;
        }

        /* -------- scrubber -------- */
        .scrubber {
            background: #fffbe6;
        }

        .scrubber .scrubber-ctrl {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .scrubber-ctrl > input[type=range] {
            flex: 1;
            min-width: 200px;
            accent-color: #1a1a1a;
        }

        .step-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 5px 10px;
            border: 1.5px solid #1a1a1a;
            border-radius: 5px;
            background: #fff;
            cursor: pointer;
        }

        .step-btn:hover {
            background: #f6efd6;
        }

        .step-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            min-width: 90px;
            text-align: center;
        }

        .step-meta {
            display: flex;
            flex-direction: column;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #1a1a1a44;
            gap: 4px;
        }

        .step-label {
            font-size: 22px;
            color: #1a1a1a;
        }

        .step-note {
            font-size: 14px;
            color: #444;
            line-height: 1.35;
        }

        /* -------- table -------- */
        .table-wrap {
            padding: 12px 6px 6px;
            overflow-x: auto;
        }

        .route-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .route-table th {
            text-align: left;
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            padding: 6px 14px 10px;
            border-bottom: 2px solid #1a1a1a;
            letter-spacing: 0.3px;
        }

        .route-table td.cell {
            padding: 14px;
            border-bottom: 1.5px dashed #1a1a1a44;
            vertical-align: middle;
        }

        .route-table tbody tr:last-child td.cell {
            border-bottom: none;
        }

        .route-table tbody tr:hover {
            background: #fff5d6aa;
        }

        /* -------- stubs -------- */
        .stub {
            padding: 48px 24px;
            text-align: center;
            color: #555;
        }

        .hand-stub-title {
            font-size: 30px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .hand-stub-body {
            font-size: 16px;
            line-height: 1.5;
        }

        /* -------- footer -------- */
        .hand-foot {
            font-size: 13px;
            color: #777;
            margin-top: 24px;
            padding-left: 4px;
        }

        .hand-foot .mono {
            font-size: 12px;
        }

        /* -------- Segment Chip -------- */
        .seg-chip {
            display: inline-flex;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.02em;
            gap: 6px;
        }

        /* -------- Signal Dot --------- */
        .sig {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 10px;
        }

        .sig span {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #333;

        }

        .sig span:first-child {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* -------- Progress Bar -------- */
        .progress-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar .sketch-box {
            flex: 1;
            min-width: 80px;
            height: 10px;
            background: transparent;
            border: 1.5px solid #1a1a1a;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar .sketch-box .sketch-trans {
            height: 100%;
            background: repeating-linear-gradient(45deg, #1a1a1a 0 4px, transparent 4px 8px);
            transition: width 250ms ease;
        }

        .progress-bar .sketch-box span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            width: 36px;
            text-align: right;
        }

        /* --------- Mode Badge -------- */
        span.mode-badge,
        span.transition-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* --------- Mode Badge -------- */
        span.source-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            border-radius: 500px;
            padding: 3px 10px;
            white-space: nowrap;
        }
    </style>

    <!-- React + Babel pinned per skill rules -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
            integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
            crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"

            crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
            integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
            crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="layouts-data.jsx"></script>
<script type="text/babel" src="progression.jsx"></script>
<script type="text/babel" src="steps-source.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
